apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ridesharing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: 123456789.dkr.ecr.us-east-1.amazonaws.com/ride-sharing/auth-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: ridesharing-secrets
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ridesharing-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ridesharing-secrets
                  key: DB_PASSWORD
            - name: REDIS_HOST
              value: redis-service
            - name: RABBITMQ_HOST
              value: rabbitmq-service
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: ridesharing-secrets
                  key: JWT_ACCESS_SECRET
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: ridesharing
spec:
  selector:
    app: auth-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ridesharing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: 123456789.dkr.ecr.us-east-1.amazonaws.com/ride-sharing/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_HOST
              value: redis-service
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8080
            - name: USER_SERVICE_URL
              value: http://user-service:8080
            - name: RIDE_SERVICE_URL
              value: http://ride-service:8080
            - name: PAYMENT_SERVICE_URL
              value: http://payment-service:8080
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ridesharing
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
---
