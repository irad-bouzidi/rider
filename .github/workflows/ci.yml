name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ridesharing_test
          POSTGRES_USER: rider
          POSTGRES_PASSWORD: rider123
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle.kts') }}

      - name: Run Tests
        run: ./gradlew test
        working-directory: backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/ridesharing_test
          DB_USERNAME: rider
          DB_PASSWORD: rider123
          REDIS_HOST: localhost

      - name: Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "backend"
          format: "sarif"
          output: "trivy-results.sarif"

  mobile-test:
    name: Mobile Tests
    runs-on: ubuntu-latest
    defaults:
      working-directory: mobile-passenger

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile-passenger/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npx tsc --noEmit

      - name: Run Tests
        run: npx jest --passWithNoTests

  build-docker:
    name: Build Docker Images
    needs: [backend-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - ride-service
          - payment-service
          - api-gateway

    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/ride-sharing/${{ matrix.service }}:$IMAGE_TAG -f backend/services/${{ matrix.service }}/Dockerfile backend
          docker push $ECR_REGISTRY/ride-sharing/${{ matrix.service }}:$IMAGE_TAG
